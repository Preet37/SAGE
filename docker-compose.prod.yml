# Production-oriented overrides — use with:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# Adds Caddy (HTTPS), restart policies, and mounts repo `content/` for wiki images.
# Lock down ports 8000/3000 with a firewall if the droplet is public; only 80/443 need to be open for Caddy.

services:
  backend:
    restart: unless-stopped

  frontend:
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
      - frontend

volumes:
  caddy_data:
  caddy_config:
