id: explore_format_probe_visual
title: "Explore Mode: Visual Diagrams"
lesson_slug: self-attention
description: >
  Probes whether the tutor uses Mermaid diagrams or flow blocks in explore
  mode when the student asks about self-attention processes and architectures.
  The student explicitly asks for visual representations.

persona: >
  You are a visual learner who understands concepts better through diagrams
  and flowcharts. When learning about architectures or processes, you ask
  for visual representations to help you understand the flow.

mode: explore

scripted_turns:
  - role: user
    content: >
      Can you walk me through how self-attention actually works step by step?
      I want to understand the full flow from input tokens to output.
  - role: user
    content: >
      Could you draw a diagram showing the Q, K, V computation flow?
      I learn better visually.
  - role: user
    content: >
      What about multi-head attention specifically — how do the heads
      split and merge back? Can you show me that flow?

expected_behaviors:
  - "Tutor MUST use Mermaid diagrams or <flow> blocks for visual explanations"
  - "Diagrams should accurately represent the self-attention computation flow"
  - "Visual elements should appear when explicitly requested"
  - "At least 1 diagram or flow block should appear"
