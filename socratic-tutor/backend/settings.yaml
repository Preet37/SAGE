# ─────────────────────────────────────────────────────────────
#  SocraticTutor Settings
#  Non-secret configuration values. Easy to review and modify.
#  Secrets (API keys, JWT secret) stay in .env
# ─────────────────────────────────────────────────────────────

database:
  url: "sqlite:///./tutor.db"

server:
  frontend_url: "http://localhost:3000,http://localhost:3001"

# ── LLM Provider ─────────────────────────────────────────────
# Works with any OpenAI-compatible API. Examples:
#   OpenAI:  https://api.openai.com/v1
#   NVIDIA:  https://inference-api.nvidia.com
#   Azure:   https://<resource>.openai.azure.com/openai/deployments/<model>/v1
#   Together: https://api.together.xyz/v1
llm:
  base_url: "https://inference-api.nvidia.com"

# ── Search (optional) ────────────────────────────────────────
# Web search for the tutor's search_web tool. Only active if
# SEARCH_API_KEY is set in .env. Disabled gracefully otherwise.
search:
  base_url: "https://api.perplexity.ai"

# ── Models ────────────────────────────────────────────────────
models:
  tutor:
    name: "gpt-5.2"
    model_id: "openai/openai/gpt-5.2"
    max_tokens: 4096
    temperature: 0.7

  judge:
    name: "claude-sonnet-4.6"
    model_id: "aws/anthropic/bedrock-claude-sonnet-4-6"
    max_tokens: 4096
    temperature: 0.2

  vision:
    name: "gemini-2.5-flash"
    model_id: "gcp/google/gemini-2.5-flash"

  # Fallback model for heavy generation tasks (outline, long content).
  # Used automatically when the primary model times out or fails.
  fallback:
    model_id: "openai/openai/gpt-5.2"

  fast:
    name: "gpt-4.1-mini"
    model_id: "azure/openai/gpt-4.1-mini"

  rerank:
    model_id: "aws/anthropic/bedrock-claude-sonnet-4-6"

  student_sim:
    name: "claude-sonnet-4.6"
    model_id: "aws/anthropic/bedrock-claude-sonnet-4-6"
    max_tokens: 256
    temperature: 0.8

# ── Usage Limits ──────────────────────────────────────────────
# Set daily_messages to 0 for unlimited (recommended for self-hosted).
usage:
  daily_messages: 500

# ── Auth ──────────────────────────────────────────────────────
auth:
  jwt_algorithm: "HS256"
  jwt_expire_minutes: 10080  # 7 days

# ── Eval Framework ────────────────────────────────────────────
eval:
  max_turns: 10
  default_lesson: "lora"
