services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file: ./backend/.env
    volumes:
      - ./backend/tutor.db:/app/tutor.db
      - ./backend/settings.yaml:/app/settings.yaml
      - ${CONTENT_DIR:-./content}:/content
    environment:
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      - CONTENT_DIR=/content

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    depends_on:
      - backend
