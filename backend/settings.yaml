# ─────────────────────────────────────────────────────────────
#  SocraticTutor Settings
#  Non-secret configuration values. Easy to review and modify.
#  Secrets (API keys, JWT secret) stay in .env
# ─────────────────────────────────────────────────────────────

database:
  url: "sqlite:///./tutor.db"

server:
  frontend_url: "http://localhost:3000,http://localhost:3001"

# ── LLM Provider ─────────────────────────────────────────────
# Works with any OpenAI-compatible API. Examples:
#   OpenAI:  https://api.openai.com/v1
#   NVIDIA:  https://inference-api.nvidia.com
#   Azure:   https://<resource>.openai.azure.com/openai/deployments/<model>/v1
#   Together: https://api.together.xyz/v1
llm:
  base_url: "https://api.groq.com/openai/v1"

# ── Search (optional) ────────────────────────────────────────
# Web search for the tutor's search_web tool. Only active if
# SEARCH_API_KEY is set in .env. Disabled gracefully otherwise.
search:
  base_url: "https://api.perplexity.ai"

# ── Models ────────────────────────────────────────────────────
models:
  tutor:
    name: "llama-3.3-70b"
    model_id: "llama-3.3-70b-versatile"
    max_tokens: 4096
    temperature: 0.7

  judge:
    name: "llama-3.3-70b"
    model_id: "llama-3.3-70b-versatile"
    max_tokens: 4096
    temperature: 0.2

  vision:
    name: "llama-3.3-70b"
    model_id: "llama-3.3-70b-versatile"

  fallback:
    model_id: "llama-3.1-8b-instant"

  fast:
    name: "llama-3.1-8b-instant"
    model_id: "llama-3.1-8b-instant"

  rerank:
    model_id: "llama-3.3-70b-versatile"

  student_sim:
    name: "llama-3.1-8b-instant"
    model_id: "llama-3.1-8b-instant"
    max_tokens: 256
    temperature: 0.8

# ── Usage Limits ──────────────────────────────────────────────
# Set daily_messages to 0 for unlimited (recommended for self-hosted).
usage:
  daily_messages: 500

# ── Auth ──────────────────────────────────────────────────────
auth:
  jwt_algorithm: "HS256"
  jwt_expire_minutes: 10080  # 7 days

# ── Eval Framework ────────────────────────────────────────────
eval:
  max_turns: 10
  default_lesson: "lora"

# ── Track features ────────────────────────────────────────────
# Each track ships behind a flag so the core tutor keeps working
# even if a track's external dependency is misconfigured.
features:
  # Cognition: response verification + semantic memory + MCP
  verification: true
  semantic_memory: true
  mcp_server: true

  # Arista: peer matching + resource router
  peer_network: true
  resource_router: true

  # Cloudinary: media uploads + AI transforms
  cloudinary: true

  # Fetch.ai: Agentverse uAgent
  fetchai_agent: false   # opt-in: requires AGENTVERSE_API_KEY

  # ZETIC: on-device WebLLM Pocket Tutor
  on_device: true

# ── External integrations ─────────────────────────────────────
cloudinary:
  cloud_name: ""         # Set via CLOUDINARY_CLOUD_NAME env var
  upload_preset: "sage_unsigned"
  folder: "sage"

fetchai:
  agentverse_url: "https://agentverse.ai"
  asi_one_url: "https://asi1.ai"
  agent_name: "sage-tutor"
  agent_seed: ""         # Set via FETCHAI_AGENT_SEED env var (24+ chars)

resource_router:
  arxiv_url: "http://export.arxiv.org/api/query"
  github_url: "https://api.github.com"
  youtube_search_enabled: false  # Requires YOUTUBE_API_KEY
